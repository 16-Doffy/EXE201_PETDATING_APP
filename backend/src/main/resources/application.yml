server:
  port: ${PORT:8080}

spring:
  application:
    name: petdating-admin-api
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bosistive}
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:change-me}
      roles: ADMIN

admin:
  security:
    allowed-origin-patterns: ${ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080,https://*.vercel.app}

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: INFO
