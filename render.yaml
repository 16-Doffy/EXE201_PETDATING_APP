services:
  - type: web
    name: petdating-admin-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://exe-201-petdating-app.vercel.app,https://*.vercel.app
